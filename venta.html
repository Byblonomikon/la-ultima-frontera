<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Botiga · La Última Frontera</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div id="header-placeholder"></div>
    <section class="hero"><h1>Botiga directa</h1><p>Compra llibres disponibles sense intermediaris. Ara es mostren tots directament i pots filtrar-los amb el cercador quan n'hi hagi molts.</p></section>

    <section>
      <div class="controls">
        <input id="search" placeholder="Filtra per títol o autor" />
        <select id="sort">
          <option value="title">Ordena per títol</option>
          <option value="author">Ordena per autor</option>
        </select>
      </div>
      <p id="resultsInfo" class="notice"></p>
      <div id="saleBooks" class="grid"></div>
    </section>
  </div>

  <script src="app.js"></script>
  <script>
    app.loadHeader();
    const search = document.getElementById('search');
    const sort = document.getElementById('sort');
    const resultsInfo = document.getElementById('resultsInfo');
    const saleBooks = document.getElementById('saleBooks');
    let availableBooks = [];

    function render() {
      const q = search.value.toLowerCase();
      const sorted = [...availableBooks]
        .filter((b) => `${b.titulo} ${b.autor}`.toLowerCase().includes(q))
        .sort((a, b) => {
          if (sort.value === 'author') return a.autor.localeCompare(b.autor);
          return a.titulo.localeCompare(b.titulo);
        });

      resultsInfo.textContent = sorted.length
        ? `${sorted.length} llibre(s) disponible(s)`
        : 'No hi ha llibres en venda amb aquests filtres.';

      saleBooks.innerHTML = '';

      sorted.forEach((b) => {
        const card = document.createElement('article');
        card.className = 'card book-item';
        card.innerHTML = `
          <h3>${b.titulo}</h3>
          <p><strong>Autor:</strong> ${b.autor}</p>
          <p>${b.descripcion}</p>
          <button>Afegir a la cistella</button>
        `;
        card.querySelector('button').addEventListener('click', () => {
          const ok = app.addToCart({ titulo: b.titulo, autor: b.autor, precio: b.precio || 0 });
          alert(ok ? 'Llibre afegit a la cistella.' : 'Aquest llibre ja és a la cistella.');
        });
        saleBooks.appendChild(card);
      });
    }

    app.getBooks().then((data) => {
      availableBooks = data
        .filter((b) => b.venta)
        .map((b) => ({ ...b, precio: b.precio || 15 }));
      render();
    });

    window.addEventListener('storage', (event) => {
      if (event.key === 'llibresCustom') {
        app.getBooks().then((data) => {
          availableBooks = data
            .filter((b) => b.venta)
            .map((b) => ({ ...b, precio: b.precio || 15 }));
          render();
        });
      }
    });

    search.addEventListener('input', render);
    sort.addEventListener('change', render);
  </script>
</body>
</html>
