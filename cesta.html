<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cistella · La Última Frontera</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div id="header-placeholder"></div>
    <section class="hero"><h1>Cistella</h1><p>Revisa la selecció i finalitza la teva comanda per correu.</p></section>

    <section>
      <div id="cartList" class="grid"></div>
      <p id="total" class="card"></p>
      <button id="clearBtn">Buidar cistella</button>
    </section>
  </div>

  <script src="app.js"></script>
  <script>
    app.loadHeader();
    const cartList = document.getElementById('cartList');
    const total = document.getElementById('total');

    function drawCart() {
      const cart = app.getCart();
      cartList.innerHTML = '';

      if (!cart.length) {
        total.textContent = 'La cistella està buida.';
        return;
      }

      let sum = 0;
      cart.forEach((item) => {
        sum += Number(item.precio || 0);
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `<h3>${item.titulo}</h3><p>${item.autor}</p><p>${Number(item.precio).toFixed(2)} €</p>`;
        cartList.appendChild(card);
      });
      total.textContent = `Total estimat: ${sum.toFixed(2)} €`;
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
      app.setCart([]);
      drawCart();
    });

    drawCart();
  </script>
</body>
</html>
