<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Última Frontera</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div id="header-placeholder"></div>

    <section class="hero">
      <h1>Una llibreria-arxiu més moderna, viva i interactiva</h1>
      <p>Hem renovat l'experiència per facilitar la descoberta de llibres, la compra directa i la connexió amb una comunitat lectora crítica.</p>
      <div class="stats" id="stats"></div>
    </section>

    <section>
      <h2>Selecció destacada</h2>
      <div class="grid" id="featured"></div>
    </section>
  </div>

  <script src="app.js"></script>
  <script>
    app.loadHeader();

    app.getBooks().then((books) => {
      const stats = document.getElementById('stats');
      const enVenta = books.filter((b) => b.venta).length;
      stats.innerHTML = `
        <div class="stat"><strong>${books.length}</strong>Total llibres</div>
        <div class="stat"><strong>${enVenta}</strong>Disponibles en venda</div>
        <div class="stat"><strong>24h</strong>Resposta habitual</div>
      `;

      const featured = document.getElementById('featured');
      books.slice(0, 3).forEach((book) => {
        const card = document.createElement('article');
        card.className = 'card book-item';
        card.innerHTML = `
          <h3>${book.titulo}</h3>
          <p><strong>Autor:</strong> ${book.autor}</p>
          <p>${book.descripcion}</p>
        `;
        featured.appendChild(card);
      });
    });
  </script>
</body>
</html>
