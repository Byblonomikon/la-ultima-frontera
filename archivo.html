<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arxiu · La Última Frontera</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div id="header-placeholder"></div>
    <section class="hero"><h1>Arxiu de llibres</h1><p>Cerca, filtra i explora el fons complet de la col·lecció.</p></section>

    <section>
      <div class="controls">
        <input id="search" placeholder="Cerca per títol, autor o descripció" />
        <select id="statusFilter">
          <option value="all">Tots els estats</option>
          <option value="malmès">Malmès</option>
          <option value="usat">Usat</option>
          <option value="en bon estat">En bon estat</option>
          <option value="com nou">Com nou</option>
          <option value="Bueno">Bo (antic)</option>
          <option value="Muy bueno">Molt bo (antic)</option>
        </select>
      </div>
      <div id="books" class="grid"></div>
    </section>

    <section class="card add-book">
      <h2>Afegir llibre per codi de barres o ISBN</h2>
      <p>Introdueix l'ISBN (o codi de barres) i recuperarem la informació des de Google Books.</p>
      <div class="add-book-controls">
        <input id="isbnInput" placeholder="Ex: 9780141036144" />
        <button id="isbnSearchBtn">Buscar a Google Books</button>
      </div>
      <div class="add-book-controls" style="margin-top:.6rem;">
        <button id="copySyncLinkBtn" type="button">Copiar enllaç de sincronització</button>
        <p class="notice" style="margin:0;align-self:center;">Els llibres afegits es guarden al navegador actual. Usa aquest enllaç per passar-los al mòbil.</p>
      </div>
      <p id="isbnMessage" class="notice"></p>
      <div id="googlePreview"></div>
    </section>
  </div>

  <script src="app.js"></script>
  <script>
    app.loadHeader();

    const search = document.getElementById('search');
    const statusFilter = document.getElementById('statusFilter');
    const booksEl = document.getElementById('books');
    const isbnInput = document.getElementById('isbnInput');
    const isbnSearchBtn = document.getElementById('isbnSearchBtn');
    const copySyncLinkBtn = document.getElementById('copySyncLinkBtn');
    const isbnMessage = document.getElementById('isbnMessage');
    const googlePreview = document.getElementById('googlePreview');
    let allBooks = [];

    function draw() {
      const q = search.value.toLowerCase();
      const status = statusFilter.value;
      const filtered = allBooks.filter((b) => {
        const matchesText = `${b.titulo} ${b.autor} ${b.descripcion}`.toLowerCase().includes(q);
        const matchesStatus = status === 'all' || b.estado === status;
        return matchesText && matchesStatus;
      });

      booksEl.innerHTML = filtered.length ? '' : '<p class="notice">No s’han trobat llibres amb aquests filtres.</p>';
      filtered.forEach((b) => {
        const card = document.createElement('article');
        card.className = 'card book-item';
        card.innerHTML = `
          <h3>${b.titulo}</h3>
          <p><strong>${b.autor}</strong></p>
          <p>${b.descripcion}</p>
          <p><strong>Estat:</strong> ${b.estado}</p>
          ${b.venta ? `<p><strong>Preu:</strong> ${Number(b.precio || 0).toFixed(2)} €</p><button class="add-to-cart-btn">Afegir a la llista de compra</button>` : ''}
        `;

        if (b.venta) {
          card.querySelector('.add-to-cart-btn').addEventListener('click', () => {
            const ok = app.addToCart({ titulo: b.titulo, autor: b.autor, precio: Number(b.precio || 0) });
            alert(ok ? 'Llibre afegit a la cistella.' : 'Aquest llibre ja és a la cistella.');
          });
        }

        booksEl.appendChild(card);
      });
    }

    app.getBooks().then((books) => { allBooks = books; draw(); });
    search.addEventListener('input', draw);
    statusFilter.addEventListener('change', draw);

    function setMessage(text) {
      isbnMessage.textContent = text;
    }

    function setSearchingState(isSearching) {
      isbnSearchBtn.disabled = isSearching;
      isbnSearchBtn.textContent = isSearching ? 'Buscant...' : 'Buscar a Google Books';
      isbnInput.disabled = isSearching;
    }

    async function copySyncLink() {
      const token = app.exportCustomBooksToken();
      const url = new URL(window.location.href);
      url.searchParams.set('llibres', token);

      try {
        await navigator.clipboard.writeText(url.toString());
        setMessage('Enllaç copiat. Obre\'l al mòbil per importar els llibres afegits.');
      } catch (error) {
        console.error(error);
        setMessage(`No s'ha pogut copiar automàticament. Copia aquest enllaç manualment: ${url.toString()}`);
      }
    }

    copySyncLinkBtn.addEventListener('click', copySyncLink);

    const tokenFromUrl = new URLSearchParams(window.location.search).get('llibres');
    if (tokenFromUrl) {
      const imported = app.importCustomBooksToken(tokenFromUrl);
      if (imported.ok) {
        setMessage(`S'han importat ${imported.added} llibre(s) des de l'enllaç de sincronització.`);
        app.getBooks().then((books) => { allBooks = books; draw(); });
      } else {
        setMessage('No s\'ha pogut importar l\'enllaç de sincronització.');
      }
    }

    function drawPreview(book) {
      const card = document.createElement('article');
      card.className = 'card book-item';
      card.innerHTML = `
        <h3>${book.titulo}</h3>
        <p><strong>Autor:</strong> ${book.autor}</p>
        <p>${book.descripcion}</p>
        <p><strong>ISBN:</strong> ${book.isbn}</p>
        <label for="bookCondition">Estat del llibre</label>
        <select id="bookCondition">
          <option value="malmès">Malmès</option>
          <option value="usat" selected>Usat</option>
          <option value="en bon estat">En bon estat</option>
          <option value="com nou">Com nou</option>
        </select>
        <label for="bookPrice">Preu (€)</label>
        <input id="bookPrice" type="number" min="0" step="0.01" value="0" />
        <button id="saveBookBtn">Afegir aquest llibre a l'arxiu</button>
      `;
      googlePreview.innerHTML = '';
      googlePreview.appendChild(card);

      card.querySelector('#saveBookBtn').addEventListener('click', () => {
        const condition = card.querySelector('#bookCondition').value;
        const price = Number(card.querySelector('#bookPrice').value || 0);
        if (Number.isNaN(price) || price < 0) {
          setMessage('Introdueix un preu vàlid (0 o superior).');
          return;
        }

        const enrichedBook = {
          ...book,
          estado: condition,
          precio: Number(price.toFixed(2))
        };

        const added = app.saveCustomBook(enrichedBook);
        if (!added) {
          setMessage('Aquest ISBN ja s\'ha afegit abans.');
          return;
        }

        allBooks.unshift(enrichedBook);
        draw();
        setMessage('Llibre afegit correctament a aquest dispositiu. Si el vols al mòbil, copia l\'enllaç de sincronització.');
      });
    }

    isbnSearchBtn.addEventListener('click', async () => {
      const code = isbnInput.value.trim();
      googlePreview.innerHTML = '';

      if (!code) {
        setMessage('Introdueix un ISBN o codi de barres.');
        return;
      }

      setSearchingState(true);
      setMessage('Buscant llibre a Google Books... (pot trigar uns segons)');
      const result = await app.fetchGoogleBookByIsbn(code, { timeoutMs: 12000 });
      setSearchingState(false);

      if (result.status === 'ok') {
        setMessage('Resultat trobat. Revisa la fitxa i afegeix-lo si vols.');
        drawPreview(result.book);
        return;
      }

      if (result.status === 'invalid_code') {
        setMessage('El codi introduït no sembla un ISBN vàlid.');
        return;
      }

      if (result.status === 'not_found') {
        setMessage('No s\'ha trobat cap llibre amb aquest ISBN a Google Books.');
        return;
      }

      if (result.status === 'timeout') {
        setMessage('La cerca ha trigat massa (12s). Torna-ho a provar en uns moments.');
        return;
      }

      setMessage('Hi ha hagut un problema de connexió amb Google Books. Torna-ho a provar.');
    });
  </script>
</body>
</html>
